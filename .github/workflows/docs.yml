name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Single in-flight deploy at a time, but don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build Sphinx HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        # Scorecard flags these as "pipCommand not pinned by hash"
        # (PinnedDependenciesID). Accepted residual risk:
        #   * `pip install --upgrade pip` is the canonical bootstrap; pinning
        #     pip itself would force regular catch-up bumps with no real
        #     security gain (this step runs in an ephemeral runner, no
        #     persistent attack surface).
        #   * `pip install -r docs/requirements.txt` is version-pinned in
        #     that file (sphinx>=7,<9 etc.). Hash-pinning would require
        #     `pip-compile --generate-hashes` and a regenerated
        #     requirements file on every Sphinx bump — high friction, low
        #     win for a docs-only build.
        #   * `pip install -e .` is an editable dev install; there's no
        #     wheel to hash since the source is the local checkout.
        # Bandit / OSV / CodeQL still scan the actual code paths.
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e .

      - name: Build pyrxd wheel for the inspect page
        # The browser-hosted inspect page (docs/inspect/) loads pyrxd at
        # runtime from a wheel served alongside the page. This step builds
        # that wheel from the same commit Sphinx is rendering, so the
        # version the page imports always matches the docs the user is
        # reading. The wheel + a small manifest.json (filename + git SHA)
        # are placed into docs/inspect_static/inspect/wheels/, which sphinx-build then
        # ships verbatim via html_extra_path.
        # Tested smoke-load happens in tests/web/test_facade_smoke.py
        # before this step in CI.
        run: |
          mkdir -p docs/inspect_static/inspect/wheels
          pip wheel --wheel-dir docs/inspect_static/inspect/wheels --no-deps .
          # Find the just-built wheel filename. There's exactly one because
          # --no-deps was specified. The manifest tells the page which file
          # to micropip.install at runtime.
          wheel=$(ls docs/inspect_static/inspect/wheels/pyrxd-*.whl | head -1)
          if [ -z "$wheel" ]; then
            echo "::error::pip wheel produced no pyrxd wheel"
            exit 1
          fi
          git_sha="${GITHUB_SHA:-unknown}"
          cat > docs/inspect_static/inspect/wheels/manifest.json <<EOF
          {
            "wheel": "$(basename "$wheel")",
            "git_sha": "${git_sha:0:7}",
            "git_sha_full": "$git_sha"
          }
          EOF
          echo "Wheel: $(basename "$wheel")"
          echo "Manifest:"
          cat docs/inspect_static/inspect/wheels/manifest.json

      - name: Build HTML
        run: sphinx-build -b html docs docs/_build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy on pushes to main (and manual dispatch). PRs get the build
    # check above for free, but they don't publish.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
