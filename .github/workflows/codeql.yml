name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan, Mondays 06:00 UTC. Catches CVEs that land in
    # CodeQL's queries after our last code change.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84  # v3
        with:
          languages: python
          # security-and-quality includes the security-extended ruleset plus
          # additional code-quality queries. Worth the extra 30s on a small lib.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84  # v3
        with:
          category: "/language:python"
