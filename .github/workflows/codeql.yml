name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan, Mondays 06:00 UTC. Catches CVEs that land in
    # CodeQL's queries after our last code change.
    - cron: "0 6 * * 1"

# Cancel old runs when a new push lands on the same branch/PR. See ci.yml.
# Scheduled runs use refs/heads/main as their ref; they don't normally
# overlap with push/PR events so concurrency cancellation is safe.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          languages: python
          # security-and-quality includes the security-extended ruleset plus
          # additional code-quality queries. Worth the extra 30s on a small lib.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          category: "/language:python"
