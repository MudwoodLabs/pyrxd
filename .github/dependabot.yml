# Dependabot configuration for pyrxd.
# Weekly updates for Python (Poetry) and GitHub Actions.
# All minor + patch updates are grouped into a single PR per ecosystem
# (wildcard pattern, every dependency); major updates open separately so
# they get focused review.
#
# Note: poetry.lock is not committed, so Dependabot performs *requirement*
# updates (editing the pyproject constraint) rather than lockfile version
# updates. Requirement updates group less reliably than locked version
# updates; committing poetry.lock would make grouping fully deterministic.

version: 2

updates:
  # Python dependencies (Poetry-managed via pyproject.toml + poetry.lock)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Zyrtnin"
    assignees:
      - "Zyrtnin"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      python-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Zyrtnin"
    assignees:
      - "Zyrtnin"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
