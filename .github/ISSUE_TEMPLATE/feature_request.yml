name: Feature request
description: Propose a new capability or enhancement for pyrxd
title: "[Feature] "
labels:
  - enhancement
  - triage

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. A clear problem statement is more useful
        than a fully-formed implementation proposal — start with the "why".

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What are you trying to do? What's blocking or awkward today?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: How might pyrxd solve this? An API sketch is helpful but optional.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, including doing nothing.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Links to related issues, specs (REPs), upstream discussions, or sample code.
    validations:
      required: false
